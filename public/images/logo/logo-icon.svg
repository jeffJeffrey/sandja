<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Fond avec gradient africain -->
  <rect width="64" height="64" rx="16" fill="url(#iconGradient)"/>
  
  <!-- Motif central - symbole stylisé -->
  <circle cx="32" cy="32" r="16" fill="white" fill-opacity="0.2"/>
  <circle cx="32" cy="32" r="10" fill="white" fill-opacity="0.3"/>
  <circle cx="32" cy="32" r="5" fill="white"/>
  
  <!-- Anneaux décoratifs -->
  <circle cx="32" cy="32" r="22" stroke="white" stroke-opacity="0.3" stroke-width="2" fill="none"/>
  
  <!-- Points cardinaux -->
  <circle cx="32" cy="8" r="3" fill="#DAA520"/>
  <circle cx="32" cy="56" r="3" fill="#DAA520"/>
  <circle cx="8" cy="32" r="3" fill="#DAA520"/>
  <circle cx="56" cy="32" r="3" fill="#DAA520"/>
  
  <defs>
    <linearGradient id="iconGradient" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8B4513"/>
      <stop offset="0.5" stop-color="#A0522D"/>
      <stop offset="1" stop-color="#D2691E"/>
    </linearGradient>
  </defs>
</svg>
