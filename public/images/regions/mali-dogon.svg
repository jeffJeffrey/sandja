<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="maliGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D2691E"/>
      <stop offset="100%" style="stop-color:#8B4513"/>
    </linearGradient>
  </defs>
  
  <!-- Fond terre/désert -->
  <rect width="800" height="500" fill="url(#maliGrad)"/>
  
  <!-- Falaises de Bandiagara stylisées -->
  <polygon points="0,350 100,200 150,280 250,180 350,250 400,150 500,220 600,180 700,250 800,200 800,500 0,500" fill="#6B3E26" opacity="0.6"/>
  <polygon points="0,400 80,300 180,350 280,280 380,320 480,260 580,300 680,260 780,320 800,300 800,500 0,500" fill="#5D3A1A" opacity="0.5"/>
  
  <!-- Motifs Bogolan -->
  <g fill="rgba(255,248,220,0.3)" stroke="rgba(255,248,220,0.4)" stroke-width="2">
    <!-- Crocodiles stylisés -->
    <g transform="translate(150, 100)">
      <ellipse cx="0" cy="0" rx="30" ry="12"/>
      <path d="M-30 0 L-50 -6 L-55 0 L-50 6 Z"/>
    </g>
    <g transform="translate(400, 80)">
      <ellipse cx="0" cy="0" rx="30" ry="12"/>
      <path d="M-30 0 L-50 -6 L-55 0 L-50 6 Z"/>
    </g>
    <g transform="translate(650, 100)">
      <ellipse cx="0" cy="0" rx="30" ry="12"/>
      <path d="M-30 0 L-50 -6 L-55 0 L-50 6 Z"/>
    </g>
    
    <!-- Cercles/Cibles -->
    <circle cx="100" cy="200" r="25" fill="none"/>
    <circle cx="100" cy="200" r="15" fill="none"/>
    <circle cx="500" cy="180" r="25" fill="none"/>
    <circle cx="500" cy="180" r="15" fill="none"/>
    <circle cx="700" cy="200" r="25" fill="none"/>
    <circle cx="700" cy="200" r="15" fill="none"/>
  </g>
  
  <!-- Drapeau Mali -->
  <g transform="translate(650, 30)">
    <rect x="0" y="0" width="40" height="80" fill="#14B53A"/>
    <rect x="40" y="0" width="40" height="80" fill="#FCD116"/>
    <rect x="80" y="0" width="40" height="80" fill="#CE1126"/>
  </g>
  
  <!-- Texte -->
  <text x="50" y="420" fill="white" font-family="Arial" font-size="48" font-weight="bold" style="text-shadow: 2px 2px 4px rgba(0,0,0,0.5)">Mali Dogon</text>
  <text x="50" y="470" fill="white" font-family="Arial" font-size="28" opacity="0.9">Bogolan • Pays Dogon</text>
</svg>
