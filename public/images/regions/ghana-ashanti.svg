<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="ghanaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#DAA520"/>
      <stop offset="100%" style="stop-color:#B8860B"/>
    </linearGradient>
  </defs>
  
  <!-- Fond -->
  <rect width="800" height="500" fill="url(#ghanaGrad)"/>
  
  <!-- Motifs Kente en arrière-plan -->
  <g opacity="0.3">
    <rect x="0" y="0" width="800" height="50" fill="#B22222"/>
    <rect x="0" y="100" width="800" height="50" fill="#228B22"/>
    <rect x="0" y="200" width="800" height="50" fill="#B22222"/>
    <rect x="0" y="300" width="800" height="50" fill="#228B22"/>
    <rect x="0" y="400" width="800" height="50" fill="#B22222"/>
  </g>
  
  <!-- Symboles Adinkra -->
  <g fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.3)" stroke-width="2">
    <!-- Gye Nyame simplifié -->
    <g transform="translate(150, 150)">
      <circle cx="0" cy="0" r="50" fill="none"/>
      <path d="M-30 0 Q-30 -30 0 -30 Q30 -30 30 0 Q30 30 0 30 Q-30 30 -30 0" fill="rgba(255,255,255,0.1)"/>
    </g>
    <g transform="translate(400, 120)">
      <circle cx="0" cy="0" r="50" fill="none"/>
      <path d="M-30 0 Q-30 -30 0 -30 Q30 -30 30 0 Q30 30 0 30 Q-30 30 -30 0" fill="rgba(255,255,255,0.1)"/>
    </g>
    <g transform="translate(650, 150)">
      <circle cx="0" cy="0" r="50" fill="none"/>
      <path d="M-30 0 Q-30 -30 0 -30 Q30 -30 30 0 Q30 30 0 30 Q-30 30 -30 0" fill="rgba(255,255,255,0.1)"/>
    </g>
  </g>
  
  <!-- Drapeau Ghana -->
  <g transform="translate(650, 30)">
    <rect x="0" y="0" width="120" height="27" fill="#CE1126"/>
    <rect x="0" y="27" width="120" height="27" fill="#FCD116"/>
    <rect x="0" y="54" width="120" height="26" fill="#006B3F"/>
    <polygon points="60,27 65,38 78,38 68,46 72,58 60,50 48,58 52,46 42,38 55,38" fill="#000"/>
  </g>
  
  <!-- Texte -->
  <text x="50" y="420" fill="white" font-family="Arial" font-size="48" font-weight="bold" style="text-shadow: 2px 2px 4px rgba(0,0,0,0.3)">Ghana Ashanti</text>
  <text x="50" y="470" fill="white" font-family="Arial" font-size="28" opacity="0.9">Kente • Adinkra</text>
</svg>
