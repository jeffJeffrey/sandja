<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <!-- Fond -->
  <rect width="800" height="600" fill="#2d2d2d"/>
  
  <!-- Bandes Kente colorées -->
  <!-- Rangée 1 -->
  <g>
    <rect x="0" y="0" width="100" height="100" fill="#FFD700"/>
    <rect x="100" y="0" width="100" height="100" fill="#228B22"/>
    <rect x="200" y="0" width="100" height="100" fill="#B22222"/>
    <rect x="300" y="0" width="100" height="100" fill="#4169E1"/>
    <rect x="400" y="0" width="100" height="100" fill="#FFD700"/>
    <rect x="500" y="0" width="100" height="100" fill="#228B22"/>
    <rect x="600" y="0" width="100" height="100" fill="#B22222"/>
    <rect x="700" y="0" width="100" height="100" fill="#4169E1"/>
  </g>
  
  <!-- Rangée 2 -->
  <g>
    <rect x="0" y="100" width="100" height="100" fill="#B22222"/>
    <rect x="100" y="100" width="100" height="100" fill="#FFD700"/>
    <rect x="200" y="100" width="100" height="100" fill="#4169E1"/>
    <rect x="300" y="100" width="100" height="100" fill="#228B22"/>
    <rect x="400" y="100" width="100" height="100" fill="#B22222"/>
    <rect x="500" y="100" width="100" height="100" fill="#FFD700"/>
    <rect x="600" y="100" width="100" height="100" fill="#4169E1"/>
    <rect x="700" y="100" width="100" height="100" fill="#228B22"/>
  </g>
  
  <!-- Rangée 3 -->
  <g>
    <rect x="0" y="200" width="100" height="100" fill="#4169E1"/>
    <rect x="100" y="200" width="100" height="100" fill="#B22222"/>
    <rect x="200" y="200" width="100" height="100" fill="#228B22"/>
    <rect x="300" y="200" width="100" height="100" fill="#FFD700"/>
    <rect x="400" y="200" width="100" height="100" fill="#4169E1"/>
    <rect x="500" y="200" width="100" height="100" fill="#B22222"/>
    <rect x="600" y="200" width="100" height="100" fill="#228B22"/>
    <rect x="700" y="200" width="100" height="100" fill="#FFD700"/>
  </g>
  
  <!-- Rangée 4 -->
  <g>
    <rect x="0" y="300" width="100" height="100" fill="#228B22"/>
    <rect x="100" y="300" width="100" height="100" fill="#4169E1"/>
    <rect x="200" y="300" width="100" height="100" fill="#FFD700"/>
    <rect x="300" y="300" width="100" height="100" fill="#B22222"/>
    <rect x="400" y="300" width="100" height="100" fill="#228B22"/>
    <rect x="500" y="300" width="100" height="100" fill="#4169E1"/>
    <rect x="600" y="300" width="100" height="100" fill="#FFD700"/>
    <rect x="700" y="300" width="100" height="100" fill="#B22222"/>
  </g>
  
  <!-- Rangée 5 -->
  <g>
    <rect x="0" y="400" width="100" height="100" fill="#FFD700"/>
    <rect x="100" y="400" width="100" height="100" fill="#228B22"/>
    <rect x="200" y="400" width="100" height="100" fill="#B22222"/>
    <rect x="300" y="400" width="100" height="100" fill="#4169E1"/>
    <rect x="400" y="400" width="100" height="100" fill="#FFD700"/>
    <rect x="500" y="400" width="100" height="100" fill="#228B22"/>
    <rect x="600" y="400" width="100" height="100" fill="#B22222"/>
    <rect x="700" y="400" width="100" height="100" fill="#4169E1"/>
  </g>
  
  <!-- Rangée 6 -->
  <g>
    <rect x="0" y="500" width="100" height="100" fill="#B22222"/>
    <rect x="100" y="500" width="100" height="100" fill="#FFD700"/>
    <rect x="200" y="500" width="100" height="100" fill="#4169E1"/>
    <rect x="300" y="500" width="100" height="100" fill="#228B22"/>
    <rect x="400" y="500" width="100" height="100" fill="#B22222"/>
    <rect x="500" y="500" width="100" height="100" fill="#FFD700"/>
    <rect x="600" y="500" width="100" height="100" fill="#4169E1"/>
    <rect x="700" y="500" width="100" height="100" fill="#228B22"/>
  </g>
  
  <!-- Lignes de séparation -->
  <g stroke="#1a1a1a" stroke-width="4">
    <!-- Verticales -->
    <line x1="100" y1="0" x2="100" y2="600"/>
    <line x1="200" y1="0" x2="200" y2="600"/>
    <line x1="300" y1="0" x2="300" y2="600"/>
    <line x1="400" y1="0" x2="400" y2="600"/>
    <line x1="500" y1="0" x2="500" y2="600"/>
    <line x1="600" y1="0" x2="600" y2="600"/>
    <line x1="700" y1="0" x2="700" y2="600"/>
    <!-- Horizontales -->
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="0" y1="500" x2="800" y2="500"/>
  </g>
  
  <!-- Motifs dans chaque carré -->
  <g stroke="#1a1a1a" stroke-width="2" fill="none">
    <!-- Quelques motifs représentatifs -->
    <circle cx="50" cy="50" r="20"/>
    <circle cx="150" cy="50" r="20"/>
    <rect x="230" y="30" width="40" height="40"/>
    <polygon points="350,30 370,70 330,70"/>
    <circle cx="450" cy="50" r="20"/>
    <circle cx="550" cy="50" r="20"/>
    <rect x="630" y="30" width="40" height="40"/>
    <polygon points="750,30 770,70 730,70"/>
  </g>
</svg>
