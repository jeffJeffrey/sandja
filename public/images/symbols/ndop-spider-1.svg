<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background pattern -->
  <rect width="200" height="200" fill="#F5F5F0"/>
  
  <!-- Spider body (central) -->
  <ellipse cx="100" cy="100" rx="25" ry="35" fill="#1B3A5C" stroke="#D4A574" stroke-width="2"/>
  
  <!-- Spider head -->
  <circle cx="100" cy="75" r="15" fill="#1B3A5C" stroke="#D4A574" stroke-width="2"/>
  
  <!-- Eyes -->
  <circle cx="95" cy="72" r="3" fill="#FFFFFF"/>
  <circle cx="105" cy="72" r="3" fill="#FFFFFF"/>
  <circle cx="95" cy="72" r="1.5" fill="#000000"/>
  <circle cx="105" cy="72" r="1.5" fill="#000000"/>
  
  <!-- Decorative pattern on body -->
  <path d="M 85 90 Q 100 95 115 90" fill="none" stroke="#D4A574" stroke-width="2"/>
  <path d="M 85 100 Q 100 105 115 100" fill="none" stroke="#D4A574" stroke-width="2"/>
  <path d="M 85 110 Q 100 115 115 110" fill="none" stroke="#D4A574" stroke-width="2"/>
  
  <!-- Left legs (4 legs) -->
  <!-- Leg 1 top left -->
  <path d="M 75 85 Q 40 60 30 45" fill="none" stroke="#1B3A5C" stroke-width="3" stroke-linecap="round"/>
  <path d="M 40 60 Q 35 50 30 45" fill="none" stroke="#D4A574" stroke-width="1.5"/>
  
  <!-- Leg 2 left -->
  <path d="M 75 95 Q 30 85 15 75" fill="none" stroke="#1B3A5C" stroke-width="3" stroke-linecap="round"/>
  <path d="M 30 85 Q 22 80 15 75" fill="none" stroke="#D4A574" stroke-width="1.5"/>
  
  <!-- Leg 3 left -->
  <path d="M 75 105 Q 30 115 15 125" fill="none" stroke="#1B3A5C" stroke-width="3" stroke-linecap="round"/>
  <path d="M 30 115 Q 22 120 15 125" fill="none" stroke="#D4A574" stroke-width="1.5"/>
  
  <!-- Leg 4 bottom left -->
  <path d="M 75 115 Q 40 140 30 155" fill="none" stroke="#1B3A5C" stroke-width="3" stroke-linecap="round"/>
  <path d="M 40 140 Q 35 150 30 155" fill="none" stroke="#D4A574" stroke-width="1.5"/>
  
  <!-- Right legs (4 legs) -->
  <!-- Leg 1 top right -->
  <path d="M 125 85 Q 160 60 170 45" fill="none" stroke="#1B3A5C" stroke-width="3" stroke-linecap="round"/>
  <path d="M 160 60 Q 165 50 170 45" fill="none" stroke="#D4A574" stroke-width="1.5"/>
  
  <!-- Leg 2 right -->
  <path d="M 125 95 Q 170 85 185 75" fill="none" stroke="#1B3A5C" stroke-width="3" stroke-linecap="round"/>
  <path d="M 170 85 Q 178 80 185 75" fill="none" stroke="#D4A574" stroke-width="1.5"/>
  
  <!-- Leg 3 right -->
  <path d="M 125 105 Q 170 115 185 125" fill="none" stroke="#1B3A5C" stroke-width="3" stroke-linecap="round"/>
  <path d="M 170 115 Q 178 120 185 125" fill="none" stroke="#D4A574" stroke-width="1.5"/>
  
  <!-- Leg 4 bottom right -->
  <path d="M 125 115 Q 160 140 170 155" fill="none" stroke="#1B3A5C" stroke-width="3" stroke-linecap="round"/>
  <path d="M 160 140 Q 165 150 170 155" fill="none" stroke="#D4A574" stroke-width="1.5"/>
  
  <!-- Web pattern in background -->
  <g opacity="0.3">
    <line x1="100" y1="20" x2="100" y2="180" stroke="#D4A574" stroke-width="1"/>
    <line x1="20" y1="100" x2="180" y2="100" stroke="#D4A574" stroke-width="1"/>
    <line x1="40" y1="40" x2="160" y2="160" stroke="#D4A574" stroke-width="1"/>
    <line x1="160" y1="40" x2="40" y2="160" stroke="#D4A574" stroke-width="1"/>
    <circle cx="100" cy="100" r="60" fill="none" stroke="#D4A574" stroke-width="1"/>
    <circle cx="100" cy="100" r="80" fill="none" stroke="#D4A574" stroke-width="1"/>
  </g>
</svg>
