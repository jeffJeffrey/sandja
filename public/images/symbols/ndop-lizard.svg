<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="ndopBg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a365d"/>
      <stop offset="100%" style="stop-color:#2b4c7e"/>
    </linearGradient>
  </defs>
  
  <!-- Fond -->
  <rect width="400" height="400" fill="url(#ndopBg3)"/>
  
  <!-- Motif de fond -->
  <g opacity="0.1">
    <circle cx="50" cy="50" r="30" fill="#E2E8F0"/>
    <circle cx="150" cy="50" r="30" fill="#E2E8F0"/>
    <circle cx="250" cy="50" r="30" fill="#E2E8F0"/>
    <circle cx="350" cy="50" r="30" fill="#E2E8F0"/>
    <circle cx="100" cy="100" r="30" fill="#E2E8F0"/>
    <circle cx="200" cy="100" r="30" fill="#E2E8F0"/>
    <circle cx="300" cy="100" r="30" fill="#E2E8F0"/>
    <circle cx="50" cy="150" r="30" fill="#E2E8F0"/>
    <circle cx="350" cy="150" r="30" fill="#E2E8F0"/>
    <circle cx="50" cy="250" r="30" fill="#E2E8F0"/>
    <circle cx="350" cy="250" r="30" fill="#E2E8F0"/>
    <circle cx="100" cy="300" r="30" fill="#E2E8F0"/>
    <circle cx="200" cy="300" r="30" fill="#E2E8F0"/>
    <circle cx="300" cy="300" r="30" fill="#E2E8F0"/>
    <circle cx="50" cy="350" r="30" fill="#E2E8F0"/>
    <circle cx="150" cy="350" r="30" fill="#E2E8F0"/>
    <circle cx="250" cy="350" r="30" fill="#E2E8F0"/>
    <circle cx="350" cy="350" r="30" fill="#E2E8F0"/>
  </g>
  
  <!-- Bordure -->
  <rect x="15" y="15" width="370" height="370" fill="none" stroke="#E2E8F0" stroke-width="4"/>
  <rect x="25" y="25" width="350" height="350" fill="none" stroke="#E2E8F0" stroke-width="2"/>
  
  <!-- Lézard stylisé -->
  <g transform="translate(200, 200) rotate(-30)">
    <!-- Queue -->
    <path d="M0 80 Q20 120 10 160 Q-5 180 15 200" stroke="#E2E8F0" stroke-width="12" fill="none" stroke-linecap="round"/>
    <path d="M0 80 Q20 120 10 160 Q-5 180 15 200" stroke="#1a365d" stroke-width="6" fill="none" stroke-linecap="round"/>
    
    <!-- Corps -->
    <ellipse cx="0" cy="30" rx="30" ry="60" fill="#E2E8F0"/>
    <ellipse cx="0" cy="30" rx="22" ry="50" fill="#1a365d"/>
    <ellipse cx="0" cy="30" rx="14" ry="40" fill="#E2E8F0" opacity="0.5"/>
    
    <!-- Motifs sur le corps -->
    <circle cx="0" cy="0" r="8" fill="#E2E8F0"/>
    <circle cx="0" cy="25" r="6" fill="#E2E8F0"/>
    <circle cx="0" cy="45" r="5" fill="#E2E8F0"/>
    
    <!-- Tête -->
    <ellipse cx="0" cy="-50" rx="20" ry="25" fill="#E2E8F0"/>
    <ellipse cx="0" cy="-50" rx="14" ry="18" fill="#1a365d"/>
    
    <!-- Yeux -->
    <circle cx="-10" cy="-55" r="5" fill="#E2E8F0"/>
    <circle cx="10" cy="-55" r="5" fill="#E2E8F0"/>
    <circle cx="-10" cy="-55" r="2" fill="#1a365d"/>
    <circle cx="10" cy="-55" r="2" fill="#1a365d"/>
    
    <!-- Pattes avant -->
    <g transform="rotate(-45)">
      <path d="M-25 -20 Q-60 -40 -80 -20" stroke="#E2E8F0" stroke-width="10" fill="none" stroke-linecap="round"/>
      <path d="M-80 -20 L-90 -30 M-80 -20 L-95 -15 M-80 -20 L-90 -5" stroke="#E2E8F0" stroke-width="4" fill="none" stroke-linecap="round"/>
    </g>
    <g transform="rotate(45)">
      <path d="M25 -20 Q60 -40 80 -20" stroke="#E2E8F0" stroke-width="10" fill="none" stroke-linecap="round"/>
      <path d="M80 -20 L90 -30 M80 -20 L95 -15 M80 -20 L90 -5" stroke="#E2E8F0" stroke-width="4" fill="none" stroke-linecap="round"/>
    </g>
    
    <!-- Pattes arrière -->
    <g transform="rotate(-30)">
      <path d="M-25 60 Q-60 80 -75 60" stroke="#E2E8F0" stroke-width="10" fill="none" stroke-linecap="round"/>
      <path d="M-75 60 L-85 50 M-75 60 L-90 65 M-75 60 L-80 75" stroke="#E2E8F0" stroke-width="4" fill="none" stroke-linecap="round"/>
    </g>
    <g transform="rotate(30)">
      <path d="M25 60 Q60 80 75 60" stroke="#E2E8F0" stroke-width="10" fill="none" stroke-linecap="round"/>
      <path d="M75 60 L85 50 M75 60 L90 65 M75 60 L80 75" stroke="#E2E8F0" stroke-width="4" fill="none" stroke-linecap="round"/>
    </g>
  </g>
  
  <!-- Symboles de fertilité aux coins -->
  <g transform="translate(55, 55)">
    <circle cx="0" cy="0" r="12" fill="none" stroke="#E2E8F0" stroke-width="2"/>
    <circle cx="0" cy="0" r="5" fill="#E2E8F0"/>
  </g>
  <g transform="translate(345, 55)">
    <circle cx="0" cy="0" r="12" fill="none" stroke="#E2E8F0" stroke-width="2"/>
    <circle cx="0" cy="0" r="5" fill="#E2E8F0"/>
  </g>
  <g transform="translate(55, 345)">
    <circle cx="0" cy="0" r="12" fill="none" stroke="#E2E8F0" stroke-width="2"/>
    <circle cx="0" cy="0" r="5" fill="#E2E8F0"/>
  </g>
  <g transform="translate(345, 345)">
    <circle cx="0" cy="0" r="12" fill="none" stroke="#E2E8F0" stroke-width="2"/>
    <circle cx="0" cy="0" r="5" fill="#E2E8F0"/>
  </g>
</svg>
