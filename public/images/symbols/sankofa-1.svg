<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background -->
  <rect width="200" height="200" fill="#FFF8E7"/>
  
  <!-- Sankofa bird (looking backward while moving forward) -->
  
  <!-- Bird body -->
  <ellipse cx="120" cy="100" rx="35" ry="25" fill="#8B4513" stroke="#000000" stroke-width="2"/>
  
  <!-- Wings -->
  <path d="M 100 85 Q 70 70 50 75 Q 55 90 80 95 Z" fill="#FFD700" stroke="#000000" stroke-width="2"/>
  <path d="M 110 85 Q 95 70 85 65" fill="none" stroke="#000000" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Tail feathers (pointing forward) -->
  <path d="M 155 95 L 175 90 L 170 100 Z" fill="#FFD700" stroke="#000000" stroke-width="2"/>
  <path d="M 155 100 L 180 100 L 175 110 Z" fill="#FFD700" stroke="#000000" stroke-width="2"/>
  <path d="M 155 105 L 175 115 L 165 110 Z" fill="#FFD700" stroke="#000000" stroke-width="2"/>
  
  <!-- Long neck curving backward -->
  <path d="M 100 95 Q 80 90 70 100 Q 65 110 70 120" fill="none" stroke="#8B4513" stroke-width="8" stroke-linecap="round"/>
  
  <!-- Head (looking back) -->
  <circle cx="70" cy="125" r="12" fill="#8B4513" stroke="#000000" stroke-width="2"/>
  
  <!-- Beak -->
  <path d="M 60 125 L 50 125 L 55 128 Z" fill="#FFD700" stroke="#000000" stroke-width="1.5"/>
  
  <!-- Eye -->
  <circle cx="68" cy="123" r="2.5" fill="#FFFFFF"/>
  <circle cx="68" cy="123" r="1.5" fill="#000000"/>
  
  <!-- Egg in mouth (symbol of retrieving from the past) -->
  <ellipse cx="55" cy="130" rx="6" ry="8" fill="#FFFFFF" stroke="#000000" stroke-width="1.5"/>
  <path d="M 55 126 Q 58 130 55 134" fill="none" stroke="#FFD700" stroke-width="1"/>
  
  <!-- Legs -->
  <path d="M 110 120 L 110 140 M 105 140 L 115 140" stroke="#000000" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 130 120 L 130 140 M 125 140 L 135 140" stroke="#000000" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Decorative Adinkra pattern elements -->
  <g opacity="0.3">
    <circle cx="100" cy="100" r="80" fill="none" stroke="#8B4513" stroke-width="1"/>
    <path d="M 100 20 L 100 30 M 100 170 L 100 180" stroke="#8B4513" stroke-width="2"/>
    <path d="M 20 100 L 30 100 M 170 100 L 180 100" stroke="#8B4513" stroke-width="2"/>
  </g>
  
  <!-- Heart symbol (representing wisdom from the past) -->
  <path d="M 120 85 Q 125 80 130 85 Q 125 90 120 85" fill="#FFD700" opacity="0.7"/>
</svg>
