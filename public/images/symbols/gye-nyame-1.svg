<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background -->
  <rect width="200" height="200" fill="#FFF8DC"/>
  
  <!-- Gye Nyame - "Except God" - Most popular Adinkra symbol -->
  
  <!-- Outer circle -->
  <circle cx="100" cy="100" r="70" fill="none" stroke="#000000" stroke-width="4"/>
  
  <!-- Inner decorative circle -->
  <circle cx="100" cy="100" r="65" fill="none" stroke="#FFD700" stroke-width="2"/>
  
  <!-- Central star/cross pattern -->
  <g id="central-symbol">
    <!-- Vertical beam -->
    <rect x="95" y="40" width="10" height="120" fill="#000000" rx="2"/>
    
    <!-- Horizontal beam -->
    <rect x="40" y="95" width="120" height="10" fill="#000000" rx="2"/>
    
    <!-- Decorative elements at ends -->
    <circle cx="100" cy="40" r="6" fill="#FFD700" stroke="#000000" stroke-width="2"/>
    <circle cx="100" cy="160" r="6" fill="#FFD700" stroke="#000000" stroke-width="2"/>
    <circle cx="40" cy="100" r="6" fill="#FFD700" stroke="#000000" stroke-width="2"/>
    <circle cx="160" cy="100" r="6" fill="#FFD700" stroke="#000000" stroke-width="2"/>
    
    <!-- Central medallion -->
    <circle cx="100" cy="100" r="20" fill="#FFD700" stroke="#000000" stroke-width="3"/>
    <circle cx="100" cy="100" r="15" fill="#FFFFFF" stroke="#000000" stroke-width="2"/>
    <circle cx="100" cy="100" r="8" fill="#000000"/>
    
    <!-- Four crescents around center (representing completeness) -->
    <path d="M 100 75 Q 90 80 100 85" fill="#FFD700" stroke="#000000" stroke-width="1.5"/>
    <path d="M 100 115 Q 110 120 100 125" fill="#FFD700" stroke="#000000" stroke-width="1.5"/>
    <path d="M 75 100 Q 80 90 85 100" fill="#FFD700" stroke="#000000" stroke-width="1.5"/>
    <path d="M 115 100 Q 120 110 125 100" fill="#FFD700" stroke="#000000" stroke-width="1.5"/>
  </g>
  
  <!-- Decorative corner elements -->
  <g opacity="0.4">
    <!-- Top left -->
    <path d="M 30 30 L 35 25 M 30 30 L 25 35" stroke="#000000" stroke-width="2" stroke-linecap="round"/>
    
    <!-- Top right -->
    <path d="M 170 30 L 165 25 M 170 30 L 175 35" stroke="#000000" stroke-width="2" stroke-linecap="round"/>
    
    <!-- Bottom left -->
    <path d="M 30 170 L 35 175 M 30 170 L 25 165" stroke="#000000" stroke-width="2" stroke-linecap="round"/>
    
    <!-- Bottom right -->
    <path d="M 170 170 L 165 175 M 170 170 L 175 165" stroke="#000000" stroke-width="2" stroke-linecap="round"/>
  </g>
  
  <!-- Radial lines (representing divine rays) -->
  <g opacity="0.3">
    <line x1="100" y1="30" x2="100" y2="20" stroke="#FFD700" stroke-width="2"/>
    <line x1="100" y1="170" x2="100" y2="180" stroke="#FFD700" stroke-width="2"/>
    <line x1="30" y1="100" x2="20" y2="100" stroke="#FFD700" stroke-width="2"/>
    <line x1="170" y1="100" x2="180" y2="100" stroke="#FFD700" stroke-width="2"/>
    
    <line x1="50" y1="50" x2="43" y2="43" stroke="#FFD700" stroke-width="2"/>
    <line x1="150" y1="50" x2="157" y2="43" stroke="#FFD700" stroke-width="2"/>
    <line x1="50" y1="150" x2="43" y2="157" stroke="#FFD700" stroke-width="2"/>
    <line x1="150" y1="150" x2="157" y2="157" stroke="#FFD700" stroke-width="2"/>
  </g>
  
  <!-- Text could be added here: "GYE NYAME" but keeping it symbolic -->
</svg>
