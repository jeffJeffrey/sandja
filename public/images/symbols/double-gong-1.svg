<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background -->
  <rect width="200" height="200" fill="#E8E4D8"/>
  
  <!-- Double Gong - Traditional Bamiléké instrument -->
  
  <!-- Left gong -->
  <g id="left-gong">
    <!-- Outer rim -->
    <circle cx="70" cy="100" r="35" fill="none" stroke="#1B3A5C" stroke-width="6"/>
    <circle cx="70" cy="100" r="32" fill="none" stroke="#C0C0C0" stroke-width="2"/>
    
    <!-- Inner circles -->
    <circle cx="70" cy="100" r="28" fill="#D4A574" opacity="0.3"/>
    <circle cx="70" cy="100" r="22" fill="none" stroke="#1B3A5C" stroke-width="3"/>
    <circle cx="70" cy="100" r="15" fill="none" stroke="#C0C0C0" stroke-width="2"/>
    <circle cx="70" cy="100" r="8" fill="#1B3A5C"/>
    
    <!-- Decorative patterns -->
    <g opacity="0.6">
      <line x1="70" y1="65" x2="70" y2="75" stroke="#1B3A5C" stroke-width="2"/>
      <line x1="70" y1="125" x2="70" y2="135" stroke="#1B3A5C" stroke-width="2"/>
      <line x1="35" y1="100" x2="45" y2="100" stroke="#1B3A5C" stroke-width="2"/>
      <line x1="95" y1="100" x2="105" y2="100" stroke="#1B3A5C" stroke-width="2"/>
    </g>
  </g>
  
  <!-- Right gong -->
  <g id="right-gong">
    <!-- Outer rim -->
    <circle cx="130" cy="100" r="35" fill="none" stroke="#1B3A5C" stroke-width="6"/>
    <circle cx="130" cy="100" r="32" fill="none" stroke="#C0C0C0" stroke-width="2"/>
    
    <!-- Inner circles -->
    <circle cx="130" cy="100" r="28" fill="#D4A574" opacity="0.3"/>
    <circle cx="130" cy="100" r="22" fill="none" stroke="#1B3A5C" stroke-width="3"/>
    <circle cx="130" cy="100" r="15" fill="none" stroke="#C0C0C0" stroke-width="2"/>
    <circle cx="130" cy="100" r="8" fill="#1B3A5C"/>
    
    <!-- Decorative patterns -->
    <g opacity="0.6">
      <line x1="130" y1="65" x2="130" y2="75" stroke="#1B3A5C" stroke-width="2"/>
      <line x1="130" y1="125" x2="130" y2="135" stroke="#1B3A5C" stroke-width="2"/>
      <line x1="95" y1="100" x2="105" y2="100" stroke="#1B3A5C" stroke-width="2"/>
      <line x1="155" y1="100" x2="165" y2="100" stroke="#1B3A5C" stroke-width="2"/>
    </g>
  </g>
  
  <!-- Connection/mounting structure -->
  <rect x="95" y="50" width="10" height="100" fill="#D4A574" stroke="#1B3A5C" stroke-width="2" rx="2"/>
  
  <!-- Decorative elements -->
  <circle cx="100" cy="55" r="5" fill="#C0C0C0" stroke="#1B3A5C" stroke-width="1"/>
  <circle cx="100" cy="145" r="5" fill="#C0C0C0" stroke="#1B3A5C" stroke-width="1"/>
  
  <!-- Traditional patterns in corners -->
  <g opacity="0.3">
    <path d="M 20 20 L 30 20 L 30 30 L 20 30 Z" fill="#1B3A5C"/>
    <path d="M 170 20 L 180 20 L 180 30 L 170 30 Z" fill="#1B3A5C"/>
    <path d="M 20 170 L 30 170 L 30 180 L 20 180 Z" fill="#1B3A5C"/>
    <path d="M 170 170 L 180 170 L 180 180 L 170 180 Z" fill="#1B3A5C"/>
  </g>
  
  <!-- Sound waves (symbolic) -->
  <g opacity="0.2">
    <path d="M 30 100 Q 20 90 15 100 Q 20 110 30 100" fill="none" stroke="#1B3A5C" stroke-width="2"/>
    <path d="M 170 100 Q 180 90 185 100 Q 180 110 170 100" fill="none" stroke="#1B3A5C" stroke-width="2"/>
  </g>
</svg>
