<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="ndopBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a365d"/>
      <stop offset="100%" style="stop-color:#2c5282"/>
    </linearGradient>
    <pattern id="ndopPattern" patternUnits="userSpaceOnUse" width="20" height="20">
      <rect width="20" height="20" fill="#1a365d"/>
      <rect x="0" y="0" width="10" height="10" fill="#2d3748" opacity="0.3"/>
      <rect x="10" y="10" width="10" height="10" fill="#2d3748" opacity="0.3"/>
    </pattern>
  </defs>
  
  <!-- Fond avec texture -->
  <rect width="400" height="400" fill="url(#ndopBg)"/>
  <rect width="400" height="400" fill="url(#ndopPattern)" opacity="0.5"/>
  
  <!-- Bordure décorative -->
  <rect x="10" y="10" width="380" height="380" fill="none" stroke="#E2E8F0" stroke-width="3"/>
  <rect x="20" y="20" width="360" height="360" fill="none" stroke="#E2E8F0" stroke-width="1"/>
  
  <!-- Corps central de l'araignée -->
  <ellipse cx="200" cy="200" rx="45" ry="55" fill="#E2E8F0"/>
  <ellipse cx="200" cy="200" rx="35" ry="45" fill="#1a365d"/>
  <ellipse cx="200" cy="200" rx="25" ry="35" fill="#E2E8F0"/>
  
  <!-- Tête -->
  <circle cx="200" cy="130" r="30" fill="#E2E8F0"/>
  <circle cx="200" cy="130" r="20" fill="#1a365d"/>
  <circle cx="190" cy="125" r="5" fill="#E2E8F0"/>
  <circle cx="210" cy="125" r="5" fill="#E2E8F0"/>
  
  <!-- Pattes - côté gauche -->
  <path d="M155 180 Q100 150 60 100" stroke="#E2E8F0" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M155 200 Q90 190 40 170" stroke="#E2E8F0" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M155 220 Q90 230 40 250" stroke="#E2E8F0" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M155 240 Q100 280 60 330" stroke="#E2E8F0" stroke-width="8" fill="none" stroke-linecap="round"/>
  
  <!-- Pattes - côté droit -->
  <path d="M245 180 Q300 150 340 100" stroke="#E2E8F0" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M245 200 Q310 190 360 170" stroke="#E2E8F0" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M245 220 Q310 230 360 250" stroke="#E2E8F0" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M245 240 Q300 280 340 330" stroke="#E2E8F0" stroke-width="8" fill="none" stroke-linecap="round"/>
  
  <!-- Motifs sur le corps -->
  <line x1="200" y1="165" x2="200" y2="235" stroke="#1a365d" stroke-width="3"/>
  <line x1="175" y1="200" x2="225" y2="200" stroke="#1a365d" stroke-width="3"/>
  
  <!-- Toile stylisée en arrière-plan -->
  <circle cx="200" cy="200" r="150" fill="none" stroke="#E2E8F0" stroke-width="1" opacity="0.3"/>
  <circle cx="200" cy="200" r="120" fill="none" stroke="#E2E8F0" stroke-width="1" opacity="0.3"/>
  <circle cx="200" cy="200" r="90" fill="none" stroke="#E2E8F0" stroke-width="1" opacity="0.3"/>
  
  <!-- Rayons de la toile -->
  <line x1="200" y1="50" x2="200" y2="350" stroke="#E2E8F0" stroke-width="1" opacity="0.2"/>
  <line x1="50" y1="200" x2="350" y2="200" stroke="#E2E8F0" stroke-width="1" opacity="0.2"/>
  <line x1="80" y1="80" x2="320" y2="320" stroke="#E2E8F0" stroke-width="1" opacity="0.2"/>
  <line x1="320" y1="80" x2="80" y2="320" stroke="#E2E8F0" stroke-width="1" opacity="0.2"/>
</svg>
