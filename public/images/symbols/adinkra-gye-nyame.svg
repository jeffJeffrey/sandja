<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="adinkraBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#2d2d2d"/>
    </linearGradient>
  </defs>
  
  <!-- Fond noir comme l'Adinkra traditionnel -->
  <rect width="400" height="400" fill="url(#adinkraBg)"/>
  
  <!-- Motif de tampons Adinkra en arrière-plan -->
  <g opacity="0.1">
    <rect x="0" y="0" width="100" height="100" fill="none" stroke="#DAA520" stroke-width="1"/>
    <rect x="100" y="0" width="100" height="100" fill="none" stroke="#DAA520" stroke-width="1"/>
    <rect x="200" y="0" width="100" height="100" fill="none" stroke="#DAA520" stroke-width="1"/>
    <rect x="300" y="0" width="100" height="100" fill="none" stroke="#DAA520" stroke-width="1"/>
    <rect x="0" y="100" width="100" height="100" fill="none" stroke="#DAA520" stroke-width="1"/>
    <rect x="300" y="100" width="100" height="100" fill="none" stroke="#DAA520" stroke-width="1"/>
    <rect x="0" y="200" width="100" height="100" fill="none" stroke="#DAA520" stroke-width="1"/>
    <rect x="300" y="200" width="100" height="100" fill="none" stroke="#DAA520" stroke-width="1"/>
    <rect x="0" y="300" width="100" height="100" fill="none" stroke="#DAA520" stroke-width="1"/>
    <rect x="100" y="300" width="100" height="100" fill="none" stroke="#DAA520" stroke-width="1"/>
    <rect x="200" y="300" width="100" height="100" fill="none" stroke="#DAA520" stroke-width="1"/>
    <rect x="300" y="300" width="100" height="100" fill="none" stroke="#DAA520" stroke-width="1"/>
  </g>
  
  <!-- Bordure dorée -->
  <rect x="15" y="15" width="370" height="370" fill="none" stroke="#DAA520" stroke-width="4"/>
  <rect x="25" y="25" width="350" height="350" fill="none" stroke="#DAA520" stroke-width="2"/>
  
  <!-- Symbole Gye Nyame -->
  <g transform="translate(200, 200)">
    <!-- Forme principale - représente l'omnipotence de Dieu -->
    
    <!-- Spirale gauche -->
    <path d="M-80 0 
             Q-80 -60 -40 -60 
             Q0 -60 0 -20
             Q0 20 -30 20
             Q-50 20 -50 0
             Q-50 -20 -30 -20" 
          stroke="#DAA520" stroke-width="12" fill="none" stroke-linecap="round"/>
    
    <!-- Spirale droite (miroir) -->
    <path d="M80 0 
             Q80 -60 40 -60 
             Q0 -60 0 -20
             Q0 20 30 20
             Q50 20 50 0
             Q50 -20 30 -20" 
          stroke="#DAA520" stroke-width="12" fill="none" stroke-linecap="round"/>
    
    <!-- Centre - représente l'unité -->
    <circle cx="0" cy="-20" r="15" fill="#DAA520"/>
    <circle cx="0" cy="-20" r="8" fill="#1a1a1a"/>
    
    <!-- Extensions vers le bas -->
    <path d="M-50 0 Q-60 40 -40 70 Q-20 90 0 70" 
          stroke="#DAA520" stroke-width="10" fill="none" stroke-linecap="round"/>
    <path d="M50 0 Q60 40 40 70 Q20 90 0 70" 
          stroke="#DAA520" stroke-width="10" fill="none" stroke-linecap="round"/>
    
    <!-- Point central bas -->
    <circle cx="0" cy="70" r="12" fill="#DAA520"/>
    <circle cx="0" cy="70" r="6" fill="#1a1a1a"/>
    
    <!-- Rayons de puissance -->
    <line x1="0" y1="-100" x2="0" y2="-120" stroke="#DAA520" stroke-width="4" stroke-linecap="round"/>
    <line x1="-30" y1="-90" x2="-45" y2="-105" stroke="#DAA520" stroke-width="4" stroke-linecap="round"/>
    <line x1="30" y1="-90" x2="45" y2="-105" stroke="#DAA520" stroke-width="4" stroke-linecap="round"/>
  </g>
  
  <!-- Étoiles décoratives -->
  <g fill="#DAA520">
    <circle cx="60" cy="60" r="4"/>
    <circle cx="340" cy="60" r="4"/>
    <circle cx="60" cy="340" r="4"/>
    <circle cx="340" cy="340" r="4"/>
    <circle cx="200" cy="50" r="3"/>
    <circle cx="200" cy="350" r="3"/>
    <circle cx="50" cy="200" r="3"/>
    <circle cx="350" cy="200" r="3"/>
  </g>
</svg>
